server.port=8084

# Core Connection
spring.kafka.bootstrap-servers=localhost:9092

# Serialization
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# 1. How long to wait for metadata (Topic info) before crashing
spring.kafka.producer.properties.max.block.ms=2000

# 2. How long to wait for a network request to fail (This is your 30s culprit!)
spring.kafka.producer.properties.request.timeout.ms=2000

# 3. How long to wait for the entire delivery process to fail
spring.kafka.producer.properties.delivery.timeout.ms=2000

# Force the AdminClient to fail fast (This fixes the 30-second hang)
spring.kafka.admin.properties.request.timeout.ms=2000
spring.kafka.admin.properties.default.api.timeout.ms=2000
management.health.kafka.enabled=false

# 1. Stop Spring from trying to auto-create topics when Kafka is down
spring.kafka.admin.auto-create=false

# 2. MUTE Kafka's annoying background connection warnings
logging.level.org.apache.kafka.clients.NetworkClient=ERROR
logging.level.org.apache.kafka.clients.admin.AdminClientConfig=ERROR

management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]
spring.cloud.openfeign.micrometer.enabled=true
spring.kafka.template.observation-enabled=true
logging.level.io.github.resilience4j.circuitbreaker=DEBUG

resilience4j.circuitbreaker.instances.kafkaNotification.slidingWindowSize=5
resilience4j.circuitbreaker.instances.kafkaNotification.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.kafkaNotification.failureRateThreshold=50
resilience4j.circuitbreaker.instances.kafkaNotification.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.kafkaNotification.permittedNumberOfCallsInHalfOpenState=2

resilience4j.circuitbreaker.instances.kafkaPickup.slidingWindowSize=5
resilience4j.circuitbreaker.instances.kafkaPickup.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.kafkaPickup.failureRateThreshold=50
resilience4j.circuitbreaker.instances.kafkaPickup.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.kafkaPickup.permittedNumberOfCallsInHalfOpenState=2
